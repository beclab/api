---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: proxylisteners.app.bytetrade.io
spec:
  group: app.bytetrade.io
  names:
    categories:
    - all
    kind: ProxyListener
    listKind: ProxyListenerList
    plural: proxylisteners
    shortNames:
    - pl
    singular: proxylistener
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.appid
      name: appid
      type: string
    - jsonPath: .spec.port
      name: port
      type: integer
    - jsonPath: .spec.podIP
      name: podIP
      type: string
    - jsonPath: .status.url
      name: url
      type: string
    - jsonPath: .status.ready
      name: ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ProxyListener declares one dynamic port that l4-bfl-proxy should expose as an
          HTTPS virtual host `<appid>-<port>.<userzone>` routed directly to a pod IP. It
          is created by an in-pod agent (e.g. the OpenCode port-watcher) whenever a
          process starts listening on a new TCP port, and consumed by l4-bfl-proxy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxyListenerSpec describes a single dynamic port to expose
              through l4-bfl-proxy.
            properties:
              appid:
                description: |-
                  Appid is the DNS subdomain prefix of the owning application, i.e.
                  md5(appName)[:8] for user apps. Combined with Port and the owner's zone it
                  yields the hostname `<appid>-<port>.<userzone>`.
                type: string
              owner:
                description: |-
                  Owner is the Olares username whose zone the hostname is built under. The
                  listener is served on that user's HTTPS filter chain.
                type: string
              podIP:
                description: |-
                  PodIP is the pod IP the backend listens on. l4-bfl-proxy dials this address
                  directly (Envoy STATIC cluster), so no Service/endpoint is required.
                type: string
              port:
                description: |-
                  Port is the TCP port the backend process listens on inside the pod. It is
                  used both as the DNS label and as the upstream port.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              protocol:
                default: http
                description: Protocol is the application-layer protocol. Only "http"
                  is supported today.
                enum:
                - http
                type: string
            required:
            - appid
            - owner
            - podIP
            - port
            type: object
          status:
            description: ProxyListenerStatus reports the generated URL and readiness
              of the listener.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              ready:
                description: Ready is true once l4-bfl-proxy has programmed the virtual
                  host.
                type: boolean
              url:
                description: URL is the externally reachable hostname `<appid>-<port>.<userzone>`
                  (no scheme).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
